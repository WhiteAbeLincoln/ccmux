type AgentMapping {
	agentId: String!
	toolUseId: String!
}

"""
Implement the DateTime<Utc> scalar

The input/output is a string in RFC3339 format.
"""
scalar DateTime

interface Event {
	apiError: JSON
	error: JSON
	isApiErrorMessage: Boolean
	raw: JSON!
	type: String!
}

"""
A scalar that can represent any JSON value.
"""
scalar JSON

input PageInput {
	limit: Int! = 0
	offset: Int! = 0
}

type Query {
	"""
	Load a session by ID.
	"""
	session(id: String!): Session
	"""
	List discovered sessions, optionally filtered by project name and paginated.
	"""
	sessions(page: PageInput, project: String): SessionsResult!
}

type Session {
	"""
	Mapping from tool_use_id to agent_id for subagent calls.
	"""
	agentMap: [AgentMapping!]!
	"""
	Load session events, optionally paginated.
	"""
	events(page: PageInput): SessionEventsData!
	meta: SessionMeta!
	"""
	The raw JSONL content of the session file.
	"""
	rawLog: String!
}

type SessionEventsData {
	events: [Event!]!
	total: Int!
}

type SessionMeta {
	agentId: String
	createdAt: DateTime
	"""
	Absolute path to the session's .jsonl file on disk.
	"""
	filePath: String
	firstMessage: String
	id: String!
	isSidechain: Boolean!
	messageCount: Int!
	parentSessionId: String
	project: String!
	projectPath: String
	slug: String
	updatedAt: DateTime
}

type SessionsResult {
	sessions: [Session!]!
	total: Int!
}

type UnknownEvent implements Event {
	apiError: JSON
	error: JSON
	isApiErrorMessage: Boolean
	raw: JSON!
	type: String!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Provides a scalar specification URL for specifying the behavior of custom scalar types.
"""
directive @specifiedBy(url: String!) on SCALAR
schema {
	query: Query
}
